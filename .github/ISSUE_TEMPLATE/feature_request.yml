name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this feature solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the proposed API, behavior, or workflow
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Links, equations, reference data, or related prior art
